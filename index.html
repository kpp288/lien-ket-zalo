<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Kết Mạng Xã Hội</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
            font-size: 24px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Định dạng chung cho các nút */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            filter: brightness(1.1);
        }

        .btn-facebook {
            background-color: #1877F2;
        }

        .btn-zalo {
            background-color: #0068FF;
        }

        .qr-modal {
            display: none; 
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); 
            justify-content: center;
            align-items: center;
        }

        .qr-modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            max-width: 300px;
            width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* Nút đóng Pop-up */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kết nối với tôi qua</h2>
        
        <div class="social-buttons">
            
            <button class="btn btn-zalo" onclick="openModal()">
                Quét Mã Zalo
            </button>
        </div>
    </div>

    <div id="zaloModal" class="qr-modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>Quét mã để vào Zalo</h3>
            
            <img src="./anhzalo.jpg" alt="Mã QR Zalo của tôi">
            
        </div>
    </div>

    <script>
        const modal = document.getElementById('zaloModal');

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function closeModalOutside(event) {
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }
    </script>

</body>
</html>
